<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HL Health & Beauty - Medical Intake Form</title>
  <style>
    :root {
      /* HL updated palette from brand reference */
      --mint: #CCF2F1;
      --pink: #F9A3E2;
      --coral: #FF9C8F;
      --lavender: #A790EA;
      --cream: #FFD68B;
      --orange: #F16925;

      /* Semantic design tokens */
      --rose: var(--pink);
      --sage: var(--mint);
      --clay: #6F4D7A;
      --ink: #251F2F;
      --muted: #6D6276;
      --border: rgba(167, 144, 234, 0.24);

      --green: #2F8F7D;
      --yellow: #C98300;
      --red: #D94A3D;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(249, 163, 226, 0.34), transparent 34%),
        radial-gradient(circle at top right, rgba(204, 242, 241, 0.46), transparent 30%),
        radial-gradient(circle at bottom left, rgba(167, 144, 234, 0.28), transparent 34%),
        radial-gradient(circle at bottom right, rgba(241, 105, 37, 0.16), transparent 30%),
        linear-gradient(135deg, #fff9f1, #f7fbff);
      min-height: 100vh;
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 34px 16px 72px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-circle {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--pink), var(--mint));
      box-shadow: 0 12px 28px rgba(167, 144, 234, 0.20);
    }

    .brand-name {
      font-size: 14px;
      letter-spacing: 2.2px;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--clay);
    }

    .language-switch {
      display: flex;
      background: rgba(255, 255, 255, 0.72);
      padding: 5px;
      border-radius: 999px;
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
    }

    .language-switch button {
      border: 0;
      padding: 9px 15px;
      border-radius: 999px;
      background: transparent;
      color: var(--clay);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .language-switch button.active {
      background: linear-gradient(135deg, var(--pink), var(--mint));
      color: #fff;
      box-shadow: 0 8px 18px rgba(167, 144, 234, 0.20);
    }

    .hero {
      text-align: center;
      margin: 18px auto 30px;
      max-width: 820px;
    }

    .eyebrow {
      color: var(--clay);
      text-transform: uppercase;
      letter-spacing: 2.4px;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1.06;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 500;
      color: #3C2A4D;
    }

    .subtitle {
      margin: 18px auto 0;
      max-width: 780px;
      color: var(--muted);
      line-height: 1.72;
      font-size: 16px;
    }

    .safety-note {
      margin: 18px auto 0;
      max-width: 760px;
      padding: 14px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid var(--border);
      color: #655B72;
      font-size: 14px;
      line-height: 1.55;
    }

    .form-shell {
      background:
        linear-gradient(145deg, rgba(255,255,255,0.86), rgba(204,242,241,0.16), rgba(249,163,226,0.10));
      border: 1px solid var(--border);
      border-radius: 34px;
      box-shadow:
        0 28px 70px rgba(167, 144, 234, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .form-inner { padding: 30px; }
    .progress-wrap { margin-bottom: 28px; }

    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .progress {
      height: 11px;
      background: #F3E9FF;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      width: 14%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--mint), var(--pink), var(--lavender));
      transition: width 0.28s ease;
    }

    .step {
      display: none;
      animation: rise 0.25s ease;
    }

    .step.active { display: block; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-header { margin-bottom: 22px; }

    .step-title {
      margin: 0;
      font-size: 28px;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 500;
      color: #3C2A4D;
    }

    .step-desc {
      margin: 9px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .full { grid-column: 1 / -1; }

    .field label,
    .question-title {
      display: block;
      font-size: 14px;
      font-weight: 750;
      color: #352941;
      margin-bottom: 8px;
    }

    input, select, textarea {
      width: 100%;
      padding: 13px 15px;
      border-radius: 17px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
    }

    textarea {
      min-height: 98px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(167, 144, 234, 0.52);
      box-shadow: 0 0 0 4px rgba(249, 163, 226, 0.18);
      background: #fff;
    }

    .service-checkbox-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .service-check {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 13px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.18s ease;
      font-weight: 650;
      color: #3B3148;
    }

    .service-check:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(167, 144, 234, 0.16);
    }

    .service-check input {
      width: auto;
      margin-top: 2px;
      accent-color: var(--clay);
    }

    .question-layer-title {
      margin: 20px 0 10px;
      font-size: 16px;
      font-weight: 850;
      color: #5A4174;
      border-left: 4px solid var(--orange);
      padding-left: 10px;
    }

    .question-box {
      padding: 17px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background:
        linear-gradient(135deg, rgba(249, 163, 226, 0.18), rgba(204, 242, 241, 0.36));
      margin-bottom: 14px;
    }

    .radio-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid var(--border);
      color: #3B3148;
      cursor: pointer;
      font-weight: 650;
      transition: all 0.18s ease;
    }

    .pill:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(167, 144, 234, 0.16);
    }

    .pill input {
      width: auto;
      accent-color: var(--clay);
    }

    .section-card {
      padding: 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px dashed rgba(167, 144, 234, 0.38);
      margin-top: 14px;
    }

    .risk-card {
      padding: 22px;
      border-radius: 26px;
      border: 1px solid var(--border);
      margin-top: 16px;
      line-height: 1.6;
    }

    .risk-title {
      font-size: 26px;
      font-family: Georgia, "Times New Roman", serif;
      margin-bottom: 8px;
    }

    .risk-green {
      background: #ecf8f1;
      border-color: rgba(47, 143, 91, 0.25);
      color: var(--green);
    }

    .risk-yellow {
      background: #fff8e8;
      border-color: rgba(185, 130, 22, 0.25);
      color: var(--yellow);
    }

    .risk-red {
      background: #fff0ef;
      border-color: rgba(199, 68, 62, 0.25);
      color: var(--red);
    }

    .risk-reasons {
      margin-top: 12px;
      color: #645854;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.7);
      padding: 12px 14px;
      border-radius: 16px;
      max-height: 180px;
      overflow: auto;
    }


    .photo-upload-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .photo-card {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      border-radius: 22px;
      padding: 15px;
      transition: all 0.18s ease;
    }

    .photo-card.required {
      border-color: rgba(241, 105, 37, 0.36);
    }

    .photo-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(167, 144, 234, 0.14);
    }

    .photo-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      font-weight: 850;
      color: #3B3148;
      margin-bottom: 8px;
    }

    .photo-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, var(--orange), var(--coral));
      white-space: nowrap;
    }

    .photo-help {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
      margin: 0 0 10px;
    }

    .photo-card input[type="file"] {
      padding: 10px;
      background: rgba(204, 242, 241, 0.18);
    }

    .photo-preview {
      display: none;
      width: 100%;
      margin-top: 10px;
      border-radius: 16px;
      max-height: 180px;
      object-fit: cover;
      border: 1px solid var(--border);
    }

    .upload-note {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.55;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .photo-upload-grid {
        grid-template-columns: 1fr;
      }
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 13px 23px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-secondary {
      background: #F3E9FF;
      color: #3C2A4D;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--lavender), var(--mint));
      color: #fff;
      box-shadow: 0 14px 28px rgba(167, 144, 234, 0.20);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 34px rgba(167, 144, 234, 0.24);
    }

    .hidden { display: none !important; }

    .small-note {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      margin-top: 8px;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 24px;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .top-bar { flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
      .service-checkbox-grid { grid-template-columns: 1fr; }
      .form-inner { padding: 22px; }
      .actions { flex-direction: column; }
      button { width: 100%; }
      .radio-row { flex-direction: column; }
      .pill { width: 100%; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="top-bar">
      <div class="logo-mark">
        <div class="logo-circle"></div>
        <div class="brand-name" data-i18n="brand">HL Health & Beauty</div>
      </div>

      <div class="language-switch">
        <button type="button" id="btnVi" class="active" onclick="setLanguage('vi')">Tiếng Việt</button>
        <button type="button" id="btnEn" onclick="setLanguage('en')">English</button>
      </div>
    </div>

    <div class="hero">
      <div class="eyebrow" data-i18n="eyebrow"></div>
      <h1 data-i18n="title"></h1>
      <p class="subtitle" data-i18n="subtitle"></p>
      <div class="safety-note" data-i18n="safetyNote"></div>
    </div>

    <div class="form-shell">
      <form id="medicalForm" class="form-inner">
        <input type="hidden" name="language" id="languageInput" value="vi" />
        <input type="hidden" name="riskLevel" id="riskLevel" value="Green" />
        <input type="hidden" name="riskReasons" id="riskReasons" />
        <input type="hidden" name="createdAt" id="createdAt" />
        <input type="hidden" name="serviceGroups" id="serviceGroupsInput" required />
        <input type="hidden" name="serviceGroupLabels" id="serviceGroupLabelsInput" />
        <input type="hidden" name="serviceProfiles" id="serviceProfilesInput" />

        <div class="progress-wrap">
          <div class="progress-top">
            <span id="stepText">Bước 1/7</span>
            <span id="progressPercent">14%</span>
          </div>
          <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
        </div>

        <section class="step active">
          <div class="step-header">
            <h2 class="step-title" data-i18n="step1Title"></h2>
            <p class="step-desc" data-i18n="step1Desc"></p>
          </div>

          <div class="grid">
            <div class="field">
              <label data-i18n="fullName"></label>
              <input name="fullName" required />
            </div>

            <div class="field">
              <label data-i18n="phone"></label>
              <input name="phone" required />
            </div>
            <div class="field">
              <label data-i18n="customerEmail"></label>
              <input type="email" name="customerEmail" required />
            </div>
            <div class="field">
              <label data-i18n="dob"></label>
              <input type="date" name="dob" required />
            </div>

            <div class="field">
              <label data-i18n="sex"></label>
              <select name="sex" id="sexSelect" required></select>
            </div>

            <div class="field">
              <label data-i18n="height"></label>
              <input type="number" name="height" min="80" max="230" required />
            </div>

            <div class="field">
              <label data-i18n="weight"></label>
              <input type="number" name="weight" min="20" max="250" required />
            </div>

            <div class="field full">
              <label data-i18n="serviceGroup"></label>
              <div id="serviceGroupCheckboxes" class="service-checkbox-grid"></div>
            </div>

            <div class="field full">
              <label data-i18n="mainConcern"></label>
              <textarea name="mainConcern" data-placeholder-key="mainConcernPlaceholder"></textarea>
            </div>
          </div>
        </section>

        <section class="step">
          <div class="step-header">
            <h2 class="step-title" data-i18n="step2Title"></h2>
            <p class="step-desc" data-i18n="step2Desc"></p>
          </div>
          <div id="allergyQuestions"></div>
          <div class="field question-box">
            <label data-i18n="allergyDetail"></label>
            <textarea name="allergyDetail"></textarea>
          </div>
        </section>

        <section class="step">
          <div class="step-header">
            <h2 class="step-title" data-i18n="step3Title"></h2>
            <p class="step-desc" data-i18n="step3Desc"></p>
          </div>
          <div id="anesthesiaQuestions"></div>
        </section>

        <section class="step">
          <div class="step-header">
            <h2 class="step-title" data-i18n="step4Title"></h2>
            <p class="step-desc" data-i18n="step4Desc"></p>
          </div>
          <div id="medicalQuestions"></div>
        </section>

        <section class="step">
          <div class="step-header">
            <h2 class="step-title" data-i18n="step5Title"></h2>
            <p class="step-desc" data-i18n="step5Desc"></p>
          </div>
          <div id="medicationQuestions"></div>
          <div class="field question-box">
            <label data-i18n="medicationDetail"></label>
            <textarea name="medicationDetail"></textarea>
          </div>
        </section>

        <section class="step">
          <div class="step-header">
            <h2 class="step-title" data-i18n="step6Title"></h2>
            <p class="step-desc" data-i18n="step6Desc"></p>
          </div>
          <div id="serviceSpecificContainer" class="section-card"></div>
        </section>

        <section class="step">
          <div class="step-header">
            <h2 class="step-title" data-i18n="step7Title"></h2>
            <p class="step-desc" data-i18n="step7Desc"></p>
          </div>

          <div id="riskResult" class="risk-card risk-green"></div>

          <div class="question-box">
            <div class="question-title" data-i18n="photoUploadTitle"></div>
            <p class="small-note" data-i18n="photoUploadDesc"></p>

            <div class="photo-upload-grid">
              <div class="photo-card required">
                <div class="photo-title">
                  <span data-i18n="photoFrontTitle"></span>
                  <span class="photo-badge" data-i18n="requiredBadge"></span>
                </div>
                <p class="photo-help" data-i18n="photoFrontHelp"></p>
                <input type="file" id="photoFront" name="photoFront" accept="image/*" data-photo-label-key="photoFrontTitle" required />
                <img class="photo-preview" id="previewFront" alt="Preview front" />
              </div>

              <div class="photo-card required">
                <div class="photo-title">
                  <span data-i18n="photoRightTitle"></span>
                  <span class="photo-badge" data-i18n="requiredBadge"></span>
                </div>
                <p class="photo-help" data-i18n="photoRightHelp"></p>
                <input type="file" id="photoRight" name="photoRight" accept="image/*" data-photo-label-key="photoRightTitle" required />
                <img class="photo-preview" id="previewRight" alt="Preview right" />
              </div>

              <div class="photo-card required">
                <div class="photo-title">
                  <span data-i18n="photoLeftTitle"></span>
                  <span class="photo-badge" data-i18n="requiredBadge"></span>
                </div>
                <p class="photo-help" data-i18n="photoLeftHelp"></p>
                <input type="file" id="photoLeft" name="photoLeft" accept="image/*" data-photo-label-key="photoLeftTitle" required />
                <img class="photo-preview" id="previewLeft" alt="Preview left" />
              </div>

              <div class="photo-card">
                <div class="photo-title">
                  <span data-i18n="photoTop45Title"></span>
                  <span class="photo-badge" data-i18n="optionalBadge"></span>
                </div>
                <p class="photo-help" data-i18n="photoTop45Help"></p>
                <input type="file" id="photoTop45" name="photoTop45" accept="image/*" data-photo-label-key="photoTop45Title" />
                <img class="photo-preview" id="previewTop45" alt="Preview top 45" />
              </div>

              <div class="photo-card">
                <div class="photo-title">
                  <span data-i18n="photoBottom45Title"></span>
                  <span class="photo-badge" data-i18n="optionalBadge"></span>
                </div>
                <p class="photo-help" data-i18n="photoBottom45Help"></p>
                <input type="file" id="photoBottom45" name="photoBottom45" accept="image/*" data-photo-label-key="photoBottom45Title" />
                <img class="photo-preview" id="previewBottom45" alt="Preview bottom 45" />
              </div>
            </div>

            <p class="upload-note" data-i18n="photoUploadNote"></p>
          </div>

          <div class="question-box">
            <label class="pill">
              <input type="checkbox" name="confirmAccuracy" required />
              <span data-i18n="confirmAccuracy"></span>
            </label>
            <br /><br />
            <label class="pill">
              <input type="checkbox" name="confirmDoctor" required />
              <span data-i18n="confirmDoctor"></span>
            </label>
          </div>
        </section>

        <div class="actions">
          <button type="button" class="btn-secondary" id="prevBtn" data-i18n="previous"></button>
          <button type="button" class="btn-primary" id="nextBtn" data-i18n="next"></button>
          <button type="submit" class="btn-primary hidden" id="submitBtn" data-i18n="submit"></button>
        </div>
      </form>
    </div>

    <div class="footer-note" data-i18n="footerNote"></div>
  </div>

  <script>
   const GOOGLE_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbye-9-j39s_CFvLlj7fN0N40wxgXFtskWLtzeDO8ErSftFoFh6xin6IsS8SpHeyMTAy4w/exec";

    let currentLang = "vi";

    const i18n = {
      vi: {
        brand: "HL Health & Beauty",
        eyebrow: "Natural Beauty Begins With Safety",
        title: "Hồ sơ bệnh án ban đầu",
        subtitle: "Vui lòng khai báo thông tin sức khỏe trước khi tư vấn dịch vụ. Thông tin này giúp đội ngũ y khoa sàng lọc an toàn trước tiêm, tiểu phẫu, phẫu thuật, gây tê, tiền mê hoặc gây mê.",
        safetyNote: "Biểu mẫu này chỉ dùng để sàng lọc an toàn ban đầu, không phải chẩn đoán y khoa và không thay thế cho khám trực tiếp với bác sĩ.",
        step: "Bước",
        next: "Tiếp tục",
        previous: "Quay lại",
        submit: "Gửi hồ sơ",

        service.profiles.forEach(profile => profiles.add(profile));

    function getLayeredServiceQuestions(selectedServices) {
      const profileSet = new Set();
      const questionIdSet = new Set();
      const layered = {
        layerProcedure: [],
        layerBleedingVTE: [],
        layerInfectionHealing: [],
        layerAnatomy: [],
        layerMaterialRevision: [],
        layerEthics: []
      };

      selectedServices.forEach(serviceCode => {
        const service = serviceProfiles[serviceCode];
        if (!service || !service.profiles) return;
        service.profiles.forEach(profile => profileSet.add(profile));
      });

      profileSet.forEach(profile => {
        const questionIds = profileQuestionMap[profile] || [];
        questionIds.forEach(questionId => {
          if (questionIdSet.has(questionId)) return;

          const q = questionBank[questionId];
          if (!q) {
            console.warn("Missing questionBank item:", questionId);
            return;
          }

          const layer = q.layer || "layerAnatomy";
          if (!layered[layer]) layered[layer] = [];

          layered[layer].push({
            name: questionId,
            flag: q.flag,
            vi: q.vi,
            en: q.en
          });

          questionIdSet.add(questionId);
        });
      });

      return layered;
    }

    function updateStep() {
      steps.forEach((step, index) => step.classList.toggle("active", index === currentStep));

      progressPercent.textContent = `${percent}%`;

      prevBtn.style.visibility = currentStep === 0 ? "hidden" : "visible";
      nextBtn.classList.toggle("hidden", currentStep === steps.length - 1);
      submitBtn.classList.toggle("hidden", currentStep !== steps.length - 1);

    function validateCurrentStep() {
      const inputs = steps[currentStep].querySelectorAll("input, select, textarea");

      for (const input of inputs) {
        if (!input.checkValidity()) {
          input.reportValidity();
          return false;
        }
      }

      if (currentStep === 0 && !getSelectedServiceGroups().length) {
        alert(i18n[currentLang].selectAtLeastOneService);
        return false;
      }

      const visibleRadioGroups = new Set();
      steps[currentStep].querySelectorAll('input[type="radio"]').forEach(input => {
        visibleRadioGroups.add(input.name);
      });

      for (const groupName of visibleRadioGroups) {
        const selected = steps[currentStep].querySelector(`input[name="${groupName}"]:checked`);
        if (!selected) {
          alert(
            currentLang === "vi"
              ? "Vui lòng trả lời đầy đủ tất cả câu hỏi trước khi tiếp tục."
              : "Please answer all questions before continuing."
          );

          const firstRadio = steps[currentStep].querySelector(`input[name="${groupName}"]`);
          if (firstRadio) {
            firstRadio.scrollIntoView({ behavior: "smooth", block: "center" });
          }
          return false;
        }
      }

      if (currentStep === steps.length - 1 && !validateRequiredPhotos()) {
        return false;
      }

      return true;
    }

    function calculateRisk() {
      const checked = form.querySelectorAll("input[type='radio']:checked");
      let hasRed = false;
      let hasYellow = false;
      const reasons = [];

      checked.forEach(input => {
        const flag = input.dataset.flag;
        const answer = input.value;
        const question = input.closest(".question-box")?.querySelector(".question-title")?.innerText || input.name;

        if (answer === "Yes" || answer === "Not sure") {
          if (flag === "red") {
            hasRed = true;
            reasons.push(`RED: ${question}`);
          } else if (flag === "yellow") {
            hasYellow = true;
            reasons.push(`YELLOW: ${question}`);
          }
        }
      });

      const riskResult = document.getElementById("riskResult");
      const riskLevelInput = document.getElementById("riskLevel");
      const riskReasonsInput = document.getElementById("riskReasons");

      riskResult.className = "risk-card";

      let level = "Green";
      let title = i18n[currentLang].greenTitle;
      let message = i18n[currentLang].greenMessage;

      if (hasRed) {
        level = "Red";
        title = i18n[currentLang].redTitle;
        message = i18n[currentLang].redMessage;
        riskResult.classList.add("risk-red");
      } else if (hasYellow) {
        level = "Yellow";
        title = i18n[currentLang].yellowTitle;
        message = i18n[currentLang].yellowMessage;
        riskResult.classList.add("risk-yellow");
      } else {
        riskResult.classList.add("risk-green");
      }

      riskResult.innerHTML = `
        <div class="risk-title">${title}</div>
        <div>${message}</div>
        ${
          reasons.length
            ? `<div class="risk-reasons"><strong>${i18n[currentLang].riskReasons}:</strong><br>${reasons.join("<br>")}</div>`
            : ""
        }
      `;

      riskLevelInput.value = level;
      riskReasonsInput.value = reasons.join(" | ");
    }

}
    async function collectFormData() {

        data[key] = value;

      data.createdAt = new Date().toISOString();

      data.serviceProfiles = getSelectedProfiles(selectedServices).join(",");

      data.photos = await collectPhotoData();
      data.photoCount = data.photos.length;
      data.photoLabels = data.photos.map(photo => photo.label).join(" | ");
      data.answerSummary = collectAnswerSummary();
      return data;

    function setupPhotoPreviews() {
      photoInputConfig.forEach(item => {
        const input = document.getElementById(item.id);
        const preview = document.getElementById(item.previewId);

        if (!input || !preview) return;

        input.addEventListener("change", () => {
          const file = input.files && input.files[0];

          if (!file) {
            preview.style.display = "none";
            preview.src = "";
            return;
          }

          if (!file.type.startsWith("image/")) {
            alert(
              currentLang === "vi"
                ? "Vui lòng chỉ tải file hình ảnh."
                : "Please upload image files only."
            );
            input.value = "";
            preview.style.display = "none";
            preview.src = "";
            return;
          }

          const reader = new FileReader();
          reader.onload = event => {
            preview.src = event.target.result;
            preview.style.display = "block";
          };
          reader.readAsDataURL(file);
        });
      });
    }

    function validateRequiredPhotos() {
      const missing = photoInputConfig.filter(item => {
        const input = document.getElementById(item.id);
        return item.required && (!input || !input.files || !input.files.length);
      });

      if (missing.length) {
        alert(
          currentLang === "vi"
            ? "Vui lòng tải lên tối thiểu 3 hình ảnh bắt buộc: chính diện, bên phải và bên trái."
            : "Please upload at least 3 required photos: front view, right side, and left side."
        );
        return false;
      }

      return true;
    }

    function resizeImageFile(file, maxWidth = 1200, quality = 0.78) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onerror = () => reject(new Error("Cannot read image file."));

        reader.onload = event => {
          const img = new Image();

          img.onerror = () => reject(new Error("Cannot load image."));

          img.onload = () => {
            const scale = Math.min(1, maxWidth / img.width);
            const width = Math.round(img.width * scale);
            const height = Math.round(img.height * scale);

            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            const dataUrl = canvas.toDataURL("image/jpeg", quality);

            resolve({
              originalName: file.name,
              mimeType: "image/jpeg",
              sizeBytes: Math.round((dataUrl.length * 3) / 4),
              dataUrl
            });
          };

          img.src = event.target.result;
        };

        reader.readAsDataURL(file);
      });
    }

    async function collectPhotoData() {
      const photos = [];

      for (const item of photoInputConfig) {
        const input = document.getElementById(item.id);

        if (!input || !input.files || !input.files.length) continue;

        const file = input.files[0];
        const compressed = await resizeImageFile(file);
        const labelKey = input.getAttribute("data-photo-label-key");

        photos.push({
          field: item.id,
          label: i18n[currentLang][labelKey] || item.id,
          required: item.required,
          originalName: compressed.originalName,
          mimeType: compressed.mimeType,
          sizeBytes: compressed.sizeBytes,
          dataUrl: compressed.dataUrl
        });
      }

      return photos;
    }

    function resetPhotoPreviews() {
      photoInputConfig.forEach(item => {
        const preview = document.getElementById(item.previewId);

        if (!preview) return;

        preview.src = "";
        preview.style.display = "none";
      });
    }

          });
        } catch (error) {
          console.error(error);
          alert(i18n[currentLang].alertSubmitError);
          return;
        }
      }

      alert(i18n[currentLang].alertSubmitted + payload.riskLevel);
      form.reset();
      currentStep = 0;
      document.getElementById("createdAt").value = new Date().toISOString();
      renderSexOptions();
      renderServiceCheckboxes();
      renderAllQuestionGroups();
      renderServiceQuestions();
      resetPhotoPreviews();
      updateStep();
    });

    document.getElementById("createdAt").value = new Date().toISOString();
    renderSexOptions();
    renderServiceCheckboxes();
    renderAllQuestionGroups();
    renderServiceQuestions();
    setupPhotoPreviews();
    setLanguage("vi");
  </script>
</body>
</html>
