<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HL Health & Beauty - Medical Intake Form</title>
  <style>
    :root {
      --rose: #e8b7b7;
      --sage: #b7cfc2;
      --clay: #9f7468;
      --ink: #2f2a28;
      --muted: #7d746f;
      --border: rgba(159, 116, 104, 0.2);
      --green: #2f8f5b;
      --yellow: #b98216;
      --red: #c7443e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(232, 183, 183, 0.38), transparent 34%),
        radial-gradient(circle at bottom right, rgba(183, 207, 194, 0.45), transparent 35%),
        linear-gradient(135deg, #fff8f4, #f8fbf7);
      min-height: 100vh;
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 34px 16px 72px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-circle {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--rose), var(--sage));
      box-shadow: 0 12px 28px rgba(159, 116, 104, 0.18);
    }

    .brand-name {
      font-size: 14px;
      letter-spacing: 2.2px;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--clay);
    }

    .language-switch {
      display: flex;
      background: rgba(255, 255, 255, 0.72);
      padding: 5px;
      border-radius: 999px;
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
    }

    .language-switch button {
      border: 0;
      padding: 9px 15px;
      border-radius: 999px;
      background: transparent;
      color: var(--clay);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .language-switch button.active {
      background: linear-gradient(135deg, var(--rose), var(--sage));
      color: #fff;
      box-shadow: 0 8px 18px rgba(159, 116, 104, 0.18);
    }

    .hero {
      text-align: center;
      margin: 18px auto 30px;
      max-width: 820px;
    }

    .eyebrow {
      color: var(--clay);
      text-transform: uppercase;
      letter-spacing: 2.4px;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1.06;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 500;
      color: #5d453f;
    }

    .subtitle {
      margin: 18px auto 0;
      max-width: 780px;
      color: var(--muted);
      line-height: 1.72;
      font-size: 16px;
    }

    .safety-note {
      margin: 18px auto 0;
      max-width: 760px;
      padding: 14px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid var(--border);
      color: #6f625d;
      font-size: 14px;
      line-height: 1.55;
    }

    .form-shell {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--border);
      border-radius: 34px;
      box-shadow:
        0 28px 70px rgba(159, 116, 104, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .form-inner { padding: 30px; }
    .progress-wrap { margin-bottom: 28px; }

    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .progress {
      height: 11px;
      background: #f0e5df;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      width: 14%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--rose), var(--sage));
      transition: width 0.28s ease;
    }

    .step {
      display: none;
      animation: rise 0.25s ease;
    }

    .step.active { display: block; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-header { margin-bottom: 22px; }

    .step-title {
      margin: 0;
      font-size: 28px;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 500;
      color: #5d453f;
    }

    .step-desc {
      margin: 9px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .full { grid-column: 1 / -1; }

    .field label,
    .question-title {
      display: block;
      font-size: 14px;
      font-weight: 750;
      color: #4a3c37;
      margin-bottom: 8px;
    }

    input, select, textarea {
      width: 100%;
      padding: 13px 15px;
      border-radius: 17px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
    }

    textarea {
      min-height: 98px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(159, 116, 104, 0.48);
      box-shadow: 0 0 0 4px rgba(232, 183, 183, 0.22);
      background: #fff;
    }

    .service-checkbox-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .service-check {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 13px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.18s ease;
      font-weight: 650;
      color: #4b403c;
    }

    .service-check:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(159, 116, 104, 0.12);
    }

    .service-check input {
      width: auto;
      margin-top: 2px;
      accent-color: var(--clay);
    }

    .question-layer-title {
      margin: 20px 0 10px;
      font-size: 16px;
      font-weight: 850;
      color: #6c4f47;
      border-left: 4px solid var(--rose);
      padding-left: 10px;
    }

    .question-box {
      padding: 17px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background:
        linear-gradient(135deg, rgba(255, 241, 241, 0.72), rgba(237, 246, 241, 0.68));
      margin-bottom: 14px;
    }

    .radio-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid var(--border);
      color: #4b403c;
      cursor: pointer;
      font-weight: 650;
      transition: all 0.18s ease;
    }

    .pill:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(159, 116, 104, 0.12);
    }

    .pill input {
      width: auto;
      accent-color: var(--clay);
    }

    .section-card {
      padding: 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px dashed rgba(159, 116, 104, 0.34);
      margin-top: 14px;
    }

    .risk-card {
      padding: 22px;
      border-radius: 26px;
      border: 1px solid var(--border);
      margin-top: 16px;
      line-height: 1.6;
    }

    .risk-title {
      font-size: 26px;
      font-family: Georgia, "Times New Roman", serif;
      margin-bottom: 8px;
    }

    .risk-green {
      background: #ecf8f1;
      border-color: rgba(47, 143, 91, 0.25);
      color: var(--green);
    }

    .risk-yellow {
      background: #fff8e8;
      border-color: rgba(185, 130, 22, 0.25);
      color: var(--yellow);
    }

    .risk-red {
      background: #fff0ef;
      border-color: rgba(199, 68, 62, 0.25);
      color: var(--red);
    }

    .risk-reasons {
      margin-top: 12px;
      color: #645854;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.7);
      padding: 12px 14px;
      border-radius: 16px;
      max-height: 180px;
      overflow: auto;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 13px 23px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-secondary {
      background: #f0e5df;
      color: #5d453f;
    }

    .btn-primary {
      background: linear-gradient(135deg, #d99fa2, #98b9a9);
      color: #fff;
      box-shadow: 0 14px 28px rgba(159, 116, 104, 0.18);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 34px rgba(159, 116, 104, 0.22);
    }

    .hidden { display: none !important; }

    .small-note {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      margin-top: 8px;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 24px;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .top-bar { flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
      .service-checkbox-grid { grid-template-columns: 1fr; }
      .form-inner { padding: 22px; }
      .actions { flex-direction: column; }
      button { width: 100%; }
      .radio-row { flex-direction: column; }
      .pill { width: 100%; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="top-bar">
      <div class="logo-mark">
        <div class="logo-circle"></div>
        <div class="brand-name" data-i18n="brand">HL Health & Beauty</div>
      </div>

      <div class="language-switch">
        <button type="button" id="btnVi" class="active" onclick="setLanguage('vi')">Tiếng Việt</button>
        <button type="button" id="btnEn" onclick="setLanguage('en')">English</button>
      </div>
    </div>

    <div class="hero">
      <div class="eyebrow" data-i18n="eyebrow"></div>
      <h1 data-i18n="title"></h1>
      <p class="subtitle" data-i18n="subtitle"></p>
      <div class="safety-note" data-i18n="safetyNote"></div>
    </div>

    <div class="form-shell">
      <form id="medicalForm" class="form-inner">
        <input type="hidden" name="language" id="languageInput" value="vi" />
        <input type="hidden" name="riskLevel" id="riskLevel" value="Green" />
        <input type="hidden" name="riskReasons" id="riskReasons" />
        <input type="hidden" name="createdAt" id="createdAt" />
        <input type="hidden" name="serviceGroups" id="serviceGroupsInput" required />
        <input type="hidden" name="serviceGroupLabels" id="serviceGroupLabelsInput" />
        <input type="hidden" name="serviceProfiles" id="serviceProfilesInput" />

        <div class="progress-wrap">
          <div class="progress-top">
            <span id="stepText">Bước 1/7</span>
            <span id="progressPercent">14%</span>
          </div>
          <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
        </div>

        <section class="step active">
          <div class="step-header">
            <h2 class="step-title" data-i18n="step1Title"></h2>
            <p class="step-desc" data-i18n="step1Desc"></p>
          </div>

          <div class="grid">
            <div class="field">
              <label data-i18n="fullName"></label>
              <input name="fullName" required />
            </div>

            <div class="field">
              <label data-i18n="phone"></label>
              <input name="phone" required />
            </div>

            <div class="field">
              <label data-i18n="dob"></label>
              <input type="date" name="dob" required />
            </div>

            <div class="field">
              <label data-i18n="sex"></label>
              <select name="sex" id="sexSelect" required></select>
            </div>

            <div class="field">
              <label data-i18n="height"></label>
              <input type="number" name="height" min="80" max="230" required />
            </div>

            <div class="field">
              <label data-i18n="weight"></label>
              <input type="number" name="weight" min="20" max="250" required />
            </div>

            <div class="field full">
              <label data-i18n="serviceGroup"></label>
              <div id="serviceGroupCheckboxes" class="service-checkbox-grid"></div>
            </div>

            <div class="field full">
              <label data-i18n="mainConcern"></label>
              <textarea name="mainConcern" data-placeholder-key="mainConcernPlaceholder"></textarea>
            </div>
          </div>
        </section>

        <section class="step">
          <div class="step-header">
            <h2 class="step-title" data-i18n="step2Title"></h2>
            <p class="step-desc" data-i18n="step2Desc"></p>
          </div>
          <div id="allergyQuestions"></div>
          <div class="field question-box">
            <label data-i18n="allergyDetail"></label>
            <textarea name="allergyDetail"></textarea>
          </div>
        </section>

        <section class="step">
          <div class="step-header">
            <h2 class="step-title" data-i18n="step3Title"></h2>
            <p class="step-desc" data-i18n="step3Desc"></p>
          </div>
          <div id="anesthesiaQuestions"></div>
        </section>

        <section class="step">
          <div class="step-header">
            <h2 class="step-title" data-i18n="step4Title"></h2>
            <p class="step-desc" data-i18n="step4Desc"></p>
          </div>
          <div id="medicalQuestions"></div>
        </section>

        <section class="step">
          <div class="step-header">
            <h2 class="step-title" data-i18n="step5Title"></h2>
            <p class="step-desc" data-i18n="step5Desc"></p>
          </div>
          <div id="medicationQuestions"></div>
          <div class="field question-box">
            <label data-i18n="medicationDetail"></label>
            <textarea name="medicationDetail"></textarea>
          </div>
        </section>

        <section class="step">
          <div class="step-header">
            <h2 class="step-title" data-i18n="step6Title"></h2>
            <p class="step-desc" data-i18n="step6Desc"></p>
          </div>
          <div id="serviceSpecificContainer" class="section-card"></div>
        </section>

        <section class="step">
          <div class="step-header">
            <h2 class="step-title" data-i18n="step7Title"></h2>
            <p class="step-desc" data-i18n="step7Desc"></p>
          </div>

          <div id="riskResult" class="risk-card risk-green"></div>

          <div class="question-box">
            <label class="pill">
              <input type="checkbox" name="confirmAccuracy" required />
              <span data-i18n="confirmAccuracy"></span>
            </label>
            <br /><br />
            <label class="pill">
              <input type="checkbox" name="confirmDoctor" required />
              <span data-i18n="confirmDoctor"></span>
            </label>
          </div>
        </section>

        <div class="actions">
          <button type="button" class="btn-secondary" id="prevBtn" data-i18n="previous"></button>
          <button type="button" class="btn-primary" id="nextBtn" data-i18n="next"></button>
          <button type="submit" class="btn-primary hidden" id="submitBtn" data-i18n="submit"></button>
        </div>
      </form>
    </div>

    <div class="footer-note" data-i18n="footerNote"></div>
  </div>

    const steps = document.querySelectorAll(".step");
    const form = document.getElementById("medicalForm");
    const serviceGroupCheckboxes = document.getElementById("serviceGroupCheckboxes");
    const serviceGroupsInput = document.getElementById("serviceGroupsInput");
    const serviceGroupLabelsInput = document.getElementById("serviceGroupLabelsInput");
    const serviceProfilesInput = document.getElementById("serviceProfilesInput");
    const sexSelect = document.getElementById("sexSelect");
    const progressBar = document.getElementById("progressBar");
    const stepText = document.getElementById("stepText");
    const progressPercent = document.getElementById("progressPercent");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const submitBtn = document.getElementById("submitBtn");

    let currentStep = 0;

    function setLanguage(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;
      document.getElementById("languageInput").value = lang;

      document.getElementById("btnVi").classList.toggle("active", lang === "vi");
      document.getElementById("btnEn").classList.toggle("active", lang === "en");

      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (i18n[lang][key]) el.textContent = i18n[lang][key];
      });

      document.querySelectorAll("[data-placeholder-key]").forEach(el => {
        const key = el.getAttribute("data-placeholder-key");
        if (i18n[lang][key]) el.placeholder = i18n[lang][key];
      });

      renderSexOptions();
      renderServiceCheckboxes();
      renderAllQuestionGroups();
      renderServiceQuestions();
      updateStep();

      if (currentStep === steps.length - 1) calculateRisk();
    }

    function renderSexOptions() {
      const currentValue = sexSelect.value;
      sexSelect.innerHTML = `
        <option value="">${i18n[currentLang].choose}</option>
        <option value="female">${sexOptions[currentLang].female}</option>
        <option value="male">${sexOptions[currentLang].male}</option>
        <option value="other">${sexOptions[currentLang].other}</option>
      `;
      sexSelect.value = currentValue;
    }

    function getSelectedServiceGroups() {
      return Array.from(document.querySelectorAll('input[name="serviceGroupOption"]:checked')).map(input => input.value);
    }

    function getSelectedProfiles(selectedServices) {
      const profiles = new Set();
      selectedServices.forEach(code => {
        const service = serviceProfiles[code];
        if (!service || !service.profiles) return;
        service.profiles.forEach(profile => profiles.add(profile));
      });
      return Array.from(profiles);
    }

    function updateServiceGroupHiddenInputs() {
      const selected = getSelectedServiceGroups();
      const labels = selected.map(code => serviceLabels[currentLang][code] || code);
      const profiles = getSelectedProfiles(selected);

      serviceGroupsInput.value = selected.join(",");
      serviceGroupLabelsInput.value = labels.join(" | ");
      serviceProfilesInput.value = profiles.join(",");
    }

    function renderServiceCheckboxes() {
      const selectedBefore = getSelectedServiceGroups();
      serviceGroupCheckboxes.innerHTML = "";

      Object.entries(serviceLabels[currentLang]).forEach(([value, label]) => {
        const item = document.createElement("label");
        item.className = "service-check";
        item.innerHTML = `
          <input type="checkbox" name="serviceGroupOption" value="${value}" />
          <span>${label}</span>
        `;
        serviceGroupCheckboxes.appendChild(item);

        const input = item.querySelector("input");
        if (selectedBefore.includes(value)) input.checked = true;

        input.addEventListener("change", () => {
          updateServiceGroupHiddenInputs();
          renderServiceQuestions();
        });
      });

      updateServiceGroupHiddenInputs();
    }

    function getRadioValue(name) {
      const checked = form.querySelector(`input[name="${name}"]:checked`);
      return checked ? checked.value : null;
    }

    function renderYesNoQuestions(containerId, questions) {
      const container = document.getElementById(containerId);
      const previousValues = {};

      questions.forEach(q => { previousValues[q.name] = getRadioValue(q.name); });
      container.innerHTML = "";

      questions.forEach(q => {
        const box = document.createElement("div");
        box.className = "question-box";
        box.innerHTML = `
          <div class="question-title">${q[currentLang]}</div>
          <div class="radio-row">
            <label class="pill"><input type="radio" name="${q.name}" value="No" data-flag="none" /> ${i18n[currentLang].no}</label>
            <label class="pill"><input type="radio" name="${q.name}" value="Yes" data-flag="${q.flag}" /> ${i18n[currentLang].yes}</label>
            <label class="pill"><input type="radio" name="${q.name}" value="Not sure" data-flag="yellow" /> ${i18n[currentLang].unknown}</label>
          </div>
        `;
        container.appendChild(box);

        const oldValue = previousValues[q.name];
        if (oldValue) {
          const target = box.querySelector(`input[name="${q.name}"][value="${oldValue}"]`);
          if (target) target.checked = true;
        }
      });
    }

    function renderAllQuestionGroups() {
      Object.keys(questionSets).forEach(containerId => {
        renderYesNoQuestions(containerId, questionSets[containerId]);
      });
    }

    function getLayeredServiceQuestions(selectedServices) {
      const profileSet = new Set();
      const questionIdSet = new Set();
      const layered = {
        layerProcedure: [],
        layerBleedingVTE: [],
        layerInfectionHealing: [],
        layerAnatomy: [],
        layerMaterialRevision: [],
        layerEthics: []
      };

      selectedServices.forEach(serviceCode => {
        const service = serviceProfiles[serviceCode];
        if (!service || !service.profiles) return;
        service.profiles.forEach(profile => profileSet.add(profile));
      });

      profileSet.forEach(profile => {
        const questionIds = profileQuestionMap[profile] || [];
        questionIds.forEach(questionId => {
          if (questionIdSet.has(questionId)) return;

          const q = questionBank[questionId];
          if (!q) {
            console.warn("Missing questionBank item:", questionId);
            return;
          }

          const layer = q.layer || "layerAnatomy";
          if (!layered[layer]) layered[layer] = [];

          layered[layer].push({
            name: questionId,
            flag: q.flag,
            vi: q.vi,
            en: q.en
          });

          questionIdSet.add(questionId);
        });
      });

      return layered;
    }

    function renderLayeredQuestions(containerId, layeredQuestions) {
      const container = document.getElementById(containerId);
      const previousValues = {};
      Object.values(layeredQuestions).flat().forEach(q => { previousValues[q.name] = getRadioValue(q.name); });

      container.innerHTML = "";

      Object.entries(layeredQuestions).forEach(([layerKey, questions]) => {
        if (!questions.length) return;

        const title = document.createElement("div");
        title.className = "question-layer-title";
        title.textContent = i18n[currentLang][layerKey] || layerKey;
        container.appendChild(title);

        questions.forEach(q => {
          const box = document.createElement("div");
          box.className = "question-box";
          box.innerHTML = `
            <div class="question-title">${q[currentLang]}</div>
            <div class="radio-row">
              <label class="pill"><input type="radio" name="${q.name}" value="No" data-flag="none" /> ${i18n[currentLang].no}</label>
              <label class="pill"><input type="radio" name="${q.name}" value="Yes" data-flag="${q.flag}" /> ${i18n[currentLang].yes}</label>
              <label class="pill"><input type="radio" name="${q.name}" value="Not sure" data-flag="yellow" /> ${i18n[currentLang].unknown}</label>
            </div>
          `;
          container.appendChild(box);

          const oldValue = previousValues[q.name];
          if (oldValue) {
            const target = box.querySelector(`input[name="${q.name}"][value="${oldValue}"]`);
            if (target) target.checked = true;
          }
        });
      });
    }

    function renderServiceQuestions() {
      const selectedServices = getSelectedServiceGroups();
      const container = document.getElementById("serviceSpecificContainer");

      if (!selectedServices.length) {
        container.innerHTML = `<p class="small-note">${i18n[currentLang].noServiceSelected}</p>`;
        return;
      }

      const layeredQuestions = getLayeredServiceQuestions(selectedServices);
      renderLayeredQuestions("serviceSpecificContainer", layeredQuestions);
      updateServiceGroupHiddenInputs();
    }

    function updateStep() {
      steps.forEach((step, index) => step.classList.toggle("active", index === currentStep));

      const percent = Math.round(((currentStep + 1) / steps.length) * 100);
      progressBar.style.width = `${percent}%`;
      stepText.textContent = `${i18n[currentLang].step} ${currentStep + 1}/${steps.length}`;
      progressPercent.textContent = `${percent}%`;

      prevBtn.style.visibility = currentStep === 0 ? "hidden" : "visible";
      nextBtn.classList.toggle("hidden", currentStep === steps.length - 1);
      submitBtn.classList.toggle("hidden", currentStep !== steps.length - 1);

      if (currentStep === steps.length - 1) calculateRisk();
    }

    function validateCurrentStep() {
      const inputs = steps[currentStep].querySelectorAll("input, select, textarea");

      for (const input of inputs) {
        if (!input.checkValidity()) {
          input.reportValidity();
          return false;
        }
      }

      if (currentStep === 0 && !getSelectedServiceGroups().length) {
        alert(i18n[currentLang].selectAtLeastOneService);
        return false;
      }

      return true;
    }

    function calculateRisk() {
      const checked = form.querySelectorAll("input[type='radio']:checked");
      let hasRed = false;
      let hasYellow = false;
      const reasons = [];

      checked.forEach(input => {
        const flag = input.dataset.flag;
        const answer = input.value;
        const question = input.closest(".question-box")?.querySelector(".question-title")?.innerText || input.name;

        if (answer === "Yes" || answer === "Not sure") {
          if (flag === "red") {
            hasRed = true;
            reasons.push(`RED: ${question}`);
          } else if (flag === "yellow") {
            hasYellow = true;
            reasons.push(`YELLOW: ${question}`);
          }
        }
      });

      const riskResult = document.getElementById("riskResult");
      const riskLevelInput = document.getElementById("riskLevel");
      const riskReasonsInput = document.getElementById("riskReasons");

      riskResult.className = "risk-card";

      let level = "Green";
      let title = i18n[currentLang].greenTitle;
      let message = i18n[currentLang].greenMessage;

      if (hasRed) {
        level = "Red";
        title = i18n[currentLang].redTitle;
        message = i18n[currentLang].redMessage;
        riskResult.classList.add("risk-red");
      } else if (hasYellow) {
        level = "Yellow";
        title = i18n[currentLang].yellowTitle;
        message = i18n[currentLang].yellowMessage;
        riskResult.classList.add("risk-yellow");
      } else {
        riskResult.classList.add("risk-green");
      }

      riskResult.innerHTML = `
        <div class="risk-title">${title}</div>
        <div>${message}</div>
        ${
          reasons.length
            ? `<div class="risk-reasons"><strong>${i18n[currentLang].riskReasons}:</strong><br>${reasons.join("<br>")}</div>`
            : ""
        }
      `;

      riskLevelInput.value = level;
      riskReasonsInput.value = reasons.join(" | ");
    }

    function collectFormData() {
      const data = {};
      const formData = new FormData(form);

      for (const [key, value] of formData.entries()) data[key] = value;

      const selectedServices = getSelectedServiceGroups();

      data.createdAt = new Date().toISOString();
      data.serviceGroups = selectedServices.join(",");
      data.serviceGroupLabels = selectedServices.map(code => serviceLabels[currentLang][code] || code).join(" | ");
      data.serviceProfiles = getSelectedProfiles(selectedServices).join(",");
      data.userAgent = navigator.userAgent;

      return data;
    }

    prevBtn.addEventListener("click", () => {
      if (currentStep > 0) {
        currentStep--;
        updateStep();
      }
    });

    nextBtn.addEventListener("click", () => {
      if (!validateCurrentStep()) return;
      if (currentStep < steps.length - 1) {
        currentStep++;
        updateStep();
      }
    });

    form.addEventListener("submit", async event => {
      event.preventDefault();
      if (!validateCurrentStep()) return;

      calculateRisk();

      const payload = collectFormData();
      console.log("HL Medical Intake Payload:", payload);

      if (GOOGLE_APPS_SCRIPT_URL) {
        try {
          await fetch(GOOGLE_APPS_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
          });
        } catch (error) {
          console.error(error);
          alert(i18n[currentLang].alertSubmitError);
          return;
        }
      }

      alert(i18n[currentLang].alertSubmitted + payload.riskLevel);
      form.reset();
      currentStep = 0;
      document.getElementById("createdAt").value = new Date().toISOString();
      renderSexOptions();
      renderServiceCheckboxes();
      renderAllQuestionGroups();
      renderServiceQuestions();
      updateStep();
    });

    document.getElementById("createdAt").value = new Date().toISOString();
    renderSexOptions();
    renderServiceCheckboxes();
    renderAllQuestionGroups();
    renderServiceQuestions();
    setLanguage("vi");
  </script>
</body>
</html>
